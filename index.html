<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Análisis Empresarial — Hilton & Pandero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #C9A84C;
      --gold-light: #E8C97A;
      --dark: #0A0A0B;
      --dark-2: #111114;
      --dark-3: #1A1A1F;
      --dark-4: #22222A;
      --text: #E8E6E0;
      --text-muted: #888880;
      --hilton-light: #0056CC;
      --pandero-light: #C0392B;
      --border: rgba(201,168,76,0.15);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--dark); color: var(--text); overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: 0.4;
    }
    /* HEADER */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 1.2rem 3rem; display: flex; align-items: center; justify-content: space-between;
      background: rgba(10,10,11,0.88); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
    }
    .header-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; font-weight: 300; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); }
    nav { display: flex; gap: 2rem; align-items: center; }
    nav a { color: var(--text-muted); text-decoration: none; font-size: 0.78rem; letter-spacing: 0.12em; text-transform: uppercase; transition: color 0.3s; cursor: pointer; }
    nav a:hover { color: var(--gold); }
    .nav-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border); }
    /* HERO */
    .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 8rem 2rem 4rem; position: relative; overflow: hidden; }
    .hero-bg { position: absolute; inset: 0; background: radial-gradient(ellipse 70% 50% at 20% 60%, rgba(0,53,128,0.12) 0%, transparent 60%), radial-gradient(ellipse 60% 50% at 80% 40%, rgba(139,26,26,0.12) 0%, transparent 60%), radial-gradient(ellipse 40% 40% at 50% 50%, rgba(201,168,76,0.04) 0%, transparent 70%); }
    .hero-tag { font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); border: 1px solid var(--gold); padding: 0.35rem 1rem; margin-bottom: 1.5rem; opacity: 0; animation: fadeUp 0.8s ease forwards 0.2s; }
    .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(3rem, 8vw, 7rem); font-weight: 300; line-height: 0.95; letter-spacing: -0.02em; opacity: 0; animation: fadeUp 1s ease forwards 0.4s; }
    .hero h1 em { font-style: italic; color: var(--gold); }
    .hero-sub { margin-top: 2rem; font-size: 0.95rem; color: var(--text-muted); font-weight: 300; letter-spacing: 0.05em; max-width: 520px; line-height: 1.7; opacity: 0; animation: fadeUp 1s ease forwards 0.6s; }
    .hero-divider { display: flex; align-items: center; gap: 1rem; margin-top: 3rem; opacity: 0; animation: fadeUp 1s ease forwards 0.8s; }
    .hero-divider span { color: var(--text-muted); font-size: 0.75rem; letter-spacing: 0.15em; }
    .hero-divider::before, .hero-divider::after { content: ''; width: 80px; height: 1px; background: var(--border); }
    /* SELECTOR */
    .selector { padding: 5rem 2rem 3rem; display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; }
    .company-card { position: relative; width: 280px; padding: 2.5rem 2rem; border: 1px solid var(--border); background: var(--dark-2); cursor: pointer; transition: all 0.4s ease; overflow: hidden; }
    .company-card::before { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; transform: scaleX(0); transition: transform 0.4s ease; }
    .company-card.hilton::before { background: var(--hilton-light); }
    .company-card.pandero::before { background: var(--pandero-light); }
    .company-card:hover::before, .company-card.active::before { transform: scaleX(1); }
    .company-card:hover, .company-card.active { border-color: rgba(201,168,76,0.3); background: var(--dark-3); transform: translateY(-4px); }
    .company-card.active { box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
    .card-num { font-family: 'Cormorant Garamond', serif; font-size: 3.5rem; font-weight: 300; color: var(--border); line-height: 1; margin-bottom: 1rem; transition: color 0.3s; }
    .company-card:hover .card-num, .company-card.active .card-num { color: var(--gold); }
    .card-name { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 400; margin-bottom: 0.5rem; }
    .card-desc { font-size: 0.78rem; color: var(--text-muted); letter-spacing: 0.08em; }
    .card-badge { display: inline-block; margin-top: 1.2rem; padding: 0.3rem 0.9rem; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; border: 1px solid; }
    .hilton .card-badge { border-color: rgba(0,86,204,0.4); color: #6699DD; }
    .pandero .card-badge { border-color: rgba(192,57,43,0.4); color: #CC6655; }
    /* CONTENT */
    .content-area { padding: 2rem; max-width: 1200px; margin: 0 auto; }
    .company-section { display: none; }
    .company-section.visible { display: block; }
    /* SECTION HEADER */
    .section-header { display: flex; align-items: flex-end; justify-content: space-between; padding: 4rem 0 3rem; border-bottom: 1px solid var(--border); margin-bottom: 4rem; gap: 2rem; flex-wrap: wrap; }
    .section-header h2 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 5vw, 4rem); font-weight: 300; line-height: 1; }
    .section-header h2 span { display: block; font-size: 0.7rem; font-family: 'DM Sans', sans-serif; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.8rem; }
    .section-stripe { height: 3px; width: 60px; }
    .hilton-section .section-stripe { background: var(--hilton-light); }
    .pandero-section .section-stripe { background: var(--pandero-light); }
    /* PART TITLE */
    .part-title { display: flex; align-items: center; gap: 1.5rem; margin: 5rem 0 3rem; }
    .part-num { font-family: 'Cormorant Garamond', serif; font-size: 4rem; font-weight: 300; line-height: 1; color: var(--border); }
    .part-label { border-left: 1px solid var(--border); padding-left: 1.5rem; }
    .part-label p { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.4rem; }
    .part-label h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 400; }
    /* GRIDS */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5px; background: var(--border); margin-bottom: 1.5px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5px; background: var(--border); margin-bottom: 1.5px; }
    /* INFO BLOCK */
    .info-block { background: var(--dark-2); padding: 2.5rem; position: relative; overflow: hidden; }
    .info-block::after { content: ''; position: absolute; top: 0; right: 0; width: 1px; height: 40%; background: var(--gold); opacity: 0.3; }
    .info-block .block-label { font-size: 0.62rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.8rem; }
    .info-block .block-label::before { content: ''; display: inline-block; width: 20px; height: 1px; background: var(--gold); }
    .info-block h4 { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 400; margin-bottom: 1.2rem; line-height: 1.3; }
    .info-block p { font-size: 0.88rem; line-height: 1.8; color: var(--text-muted); }
    .info-block.featured { background: var(--dark-3); padding: 3rem; }
    .info-block.accent-hilton { border-top: 2px solid var(--hilton-light); }
    .info-block.accent-pandero { border-top: 2px solid var(--pandero-light); }
    /* FULL BLOCK */
    .full-block { background: var(--dark-2); padding: 3rem; margin-bottom: 1.5px; }
    .full-block .block-label { font-size: 0.62rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.8rem; }
    .full-block .block-label::before { content: ''; display: inline-block; width: 20px; height: 1px; background: var(--gold); }
    .full-block h4 { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 400; margin-bottom: 1.5rem; }
    .full-block p { font-size: 0.9rem; line-height: 1.9; color: var(--text-muted); max-width: 860px; }
    /* LIST */
    .item-list { list-style: none; margin-top: 1rem; }
    .item-list li { padding: 0.75rem 0; border-bottom: 1px solid var(--border); font-size: 0.87rem; color: var(--text-muted); display: flex; align-items: flex-start; gap: 1rem; line-height: 1.6; }
    .item-list li::before { content: '→'; color: var(--gold); font-size: 0.8rem; flex-shrink: 0; margin-top: 0.1rem; }
    .item-list li strong { color: var(--text); font-weight: 500; }
    /* STAT */
    .stat-block { background: var(--dark-4); padding: 2rem; text-align: center; }
    .stat-num { font-family: 'Cormorant Garamond', serif; font-size: 2.8rem; font-weight: 300; color: var(--gold-light); line-height: 1; margin-bottom: 0.5rem; }
    .stat-desc { font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); }
    /* TIMELINE */
    .timeline { padding: 1rem 0; }
    .timeline-item { display: grid; grid-template-columns: 80px 1fr; gap: 2rem; margin-bottom: 2rem; position: relative; }
    .timeline-item::before { content: ''; position: absolute; left: 39px; top: 2.5rem; bottom: -1rem; width: 1px; background: var(--border); }
    .timeline-item:last-child::before { display: none; }
    .t-year { font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: var(--gold); font-weight: 300; text-align: right; padding-top: 0.1rem; }
    .t-dot { position: absolute; left: 34px; top: 0.4rem; width: 11px; height: 11px; border-radius: 50%; border: 2px solid var(--gold); background: var(--dark); }
    .t-content p { font-size: 0.87rem; color: var(--text-muted); line-height: 1.7; }
    .t-content strong { color: var(--text); font-weight: 500; }
    /* QUOTE */
    .quote-block { padding: 3rem; border-left: 3px solid var(--gold); background: var(--dark-3); margin: 2rem 0; }
    .quote-block p { font-family: 'Cormorant Garamond', serif; font-size: 1.45rem; font-weight: 300; font-style: italic; line-height: 1.6; color: var(--text); }
    /* MODEL GRID */
    .model-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5px; background: var(--border); margin-top: 2rem; }
    .model-item { background: var(--dark-3); padding: 2rem; }
    .model-num { font-family: 'Cormorant Garamond', serif; font-size: 2rem; color: var(--gold); opacity: 0.5; margin-bottom: 0.5rem; }
    .model-item h5 { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 400; margin-bottom: 0.8rem; color: var(--text); }
    .model-item p { font-size: 0.82rem; color: var(--text-muted); line-height: 1.7; }
    /* THEORY SECTION */
    .theory-section { padding: 5rem 2rem; max-width: 1200px; margin: 0 auto; }
    .theory-intro { background: var(--dark-3); padding: 3rem; border-left: 3px solid var(--gold); margin-bottom: 1.5px; }
    .theory-intro h3 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 300; margin-bottom: 1.2rem; }
    .theory-intro h3 span { display: block; font-family: 'DM Sans', sans-serif; font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.6rem; }
    .theory-intro p { font-size: 0.9rem; color: var(--text-muted); line-height: 1.9; max-width: 820px; }
    .theory-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5px; background: var(--border); margin-top: 0; }
    .theory-block { background: var(--dark-2); padding: 2.5rem; }
    .theory-block .t-label { font-size: 0.62rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.8rem; }
    .theory-block .t-label::before { content: ''; display: inline-block; width: 20px; height: 1px; background: var(--gold); }
    .theory-block h4 { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 400; margin-bottom: 1rem; }
    .theory-block p { font-size: 0.87rem; color: var(--text-muted); line-height: 1.8; }
    .concept-tag { display: inline-block; padding: 0.25rem 0.75rem; border: 1px solid rgba(201,168,76,0.4); color: var(--gold); font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; margin: 0.3rem 0.2rem 0 0; }
    /* MODEL TAG */
    .model-tag { display: inline-flex; align-items: center; gap: 0.6rem; padding: 0.5rem 1.2rem; border: 1px solid rgba(201,168,76,0.5); margin-bottom: 1.5rem; }
    .model-tag span { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); }
    .model-tag::before { content: '◆'; font-size: 0.5rem; color: var(--gold); }
    /* SOURCES */
    .sources-section { padding: 4rem 2rem 2rem; max-width: 1200px; margin: 0 auto; }
    .sources-header { border-bottom: 1px solid var(--border); padding-bottom: 2rem; margin-bottom: 3rem; }
    .sources-header h2 { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; font-weight: 300; }
    .sources-header h2 span { display: block; font-family: 'DM Sans', sans-serif; font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.6rem; }
    .sources-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5px; background: var(--border); }
    .source-block { background: var(--dark-2); padding: 2rem 2.5rem; }
    .source-block h5 { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 400; color: var(--gold); margin-bottom: 1.2rem; letter-spacing: 0.05em; }
    .source-item { padding: 0.65rem 0; border-bottom: 1px solid var(--border); }
    .source-item:last-child { border-bottom: none; }
    .source-item p { font-size: 0.78rem; color: var(--text-muted); line-height: 1.65; }
    .source-item p strong { color: var(--text); font-weight: 500; }
    .source-item a { color: rgba(201,168,76,0.7); text-decoration: none; font-size: 0.72rem; word-break: break-all; display: block; margin-top: 0.2rem; }
    .source-item a:hover { color: var(--gold); }
    /* FOOTER */
    footer { margin-top: 4rem; padding: 3rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
    footer p { font-size: 0.75rem; color: var(--text-muted); letter-spacing: 0.08em; }
    .footer-mark { font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: var(--gold); letter-spacing: 0.15em; }
    /* ANIMATIONS */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { opacity: 0; transform: translateY(20px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .fade-in.visible { opacity: 1; transform: translateY(0); }
    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    /* RESPONSIVE */
    @media (max-width: 768px) {
      header { padding: 1rem 1.5rem; }
      nav { gap: 1rem; }
      .grid-2, .grid-3, .model-grid, .theory-grid, .sources-grid { grid-template-columns: 1fr; }
      .info-block, .full-block, .theory-block, .theory-intro, .source-block { padding: 1.8rem; }
      .content-area { padding: 1rem; }
      .selector { padding: 3rem 1rem 2rem; }
      .company-card { width: 100%; max-width: 340px; }
      .theory-section, .sources-section { padding: 3rem 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-logo">Análisis Empresarial</div>
  <nav>
    <a onclick="showCompany('hilton')">Hilton</a>
    <div class="nav-dot"></div>
    <a onclick="showCompany('pandero')">Pandero</a>
    <div class="nav-dot"></div>
    <a href="#fuentes">Fuentes</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-tag">Intraemprendimiento &amp; Estrategia Corporativa</div>
  <h1>Dos <em>Empresas,</em><br>Una Visión</h1>
